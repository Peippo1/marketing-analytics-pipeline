name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            requirements-fastapi.txt
            requirements-streamlit.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Security audit (pip-audit)
        run: python -m pip_audit -r requirements.txt

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --max-complexity=10 --max-line-length=100 --statistics

      - name: Security scan with Bandit
        run: |
          bandit -q -r genai scoring utils etl models -x tests

  test:
    runs-on: ubuntu-latest
    needs: build-and-lint
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            requirements-fastapi.txt
            requirements-streamlit.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Security audit (pip-audit)
        run: python -m pip_audit -r requirements.txt

      - name: Run QA test suite
        run: |
          python -m pytest \
            tests/test_fastapi.py \
            tests/test_genai_service.py \
            tests/test_genai_image_service.py \
            tests/test_genai_workflow_service.py \
            tests/test_prepare_data.py \
            tests/test_crm_clients.py \
            tests/test_sheets_sync.py \
            --maxfail=1 \
            --disable-warnings \
            -q

      - name: Run Streamlit tests
        run: |
          python -m pytest tests/test_streamlit.py --maxfail=1 --disable-warnings -q

      - name: Run demo smoke check
        run: |
          ./run-demo.sh

      - name: Validate demo outputs
        run: |
          test -f demo_outputs/latest/README.txt
          find demo_outputs/latest/genai -maxdepth 2 -type f | sort

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images (root app and FastAPI scoring)
        run: |
          docker build -t marketing-analytics-app .
          docker build -f Dockerfile.fastapi -t fastapi-app .
